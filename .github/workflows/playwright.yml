name: Playwright Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      # AI가 생성한 후보 테스트는 결과만 기록하고 빌드를 막지 않음
      - name: AI candidate tests (non-blocking)
        run: npx playwright test tests/ai-candidates --reporter=line
        continue-on-error: true

      # 검증되어 승격된 core 테스트만 배포 게이트 권한을 가짐
      - name: Core regression suite (blocking)
        run: npx playwright test tests/core --reporter=line
